# rules/secrets/generic-api-key.yaml
# Detects generic API key patterns commonly found in configuration files,
# environment variables, and source code.
#
# This rule uses entropy analysis as the primary differentiator between
# actual secrets and placeholder values, since there is no fixed prefix
# to rely on unlike vendor-specific tokens.
#
# References:
#   - CWE-798: Use of Hard-coded Credentials
#   - CWE-312: Cleartext Storage of Sensitive Information

id: SPEAR-S010
name: Generic API Key
description: >
  Detects generic API key assignments in source code, configuration files,
  and environment variables. Matches common patterns like 'api_key = "...',
  'apiKey: "..."', and 'API_KEY=...' followed by high-entropy values.
  This is a broad pattern that may produce higher false-positive rates --
  entropy analysis is enabled to reduce noise.
category: secret
severity: medium
tags:
  - api-key
  - generic
  - credential
  - configuration
references:
  - https://cwe.mitre.org/data/definitions/798.html
  - https://cwe.mitre.org/data/definitions/312.html
mitre:
  - T1552.001  # Unsecured Credentials: Credentials In Files

detection:
  keywords:
    - api_key
    - apikey
    - api-key
    - apiKey
    - API_KEY
    - access_key
    - accessKey
    - ACCESS_KEY
    - secret_key
    - secretKey
    - SECRET_KEY
    - auth_token
    - authToken
    - AUTH_TOKEN

  # Matches assignments like:
  #   api_key = "sk-abc123..."
  #   apiKey: 'deadbeef...'
  #   API_KEY=some_long_value
  #   "api_key": "value"
  # Captures 16-128 character alphanumeric + common special characters
  pattern: '(?i)(?:api[_-]?key|access[_-]?key|secret[_-]?key|auth[_-]?token)\s*[:=]\s*[''\"]*([A-Za-z0-9/+=_\-.]{16,128})[''\"]*'

  # Entropy is critical for this generic rule to separate real secrets
  # from placeholders like "your-api-key-here" or "TODO"
  entropy:
    enabled: true
    threshold: 4.5

verification:
  enabled: false  # Cannot generically verify -- service-specific rules handle verification

allowlist:
  patterns:
    - '(?i)example|test|dummy|fake|placeholder|sample|your[_-]?api[_-]?key|todo|change[_-]?me|insert[_-]?here|xxx+'
    - '^[A-Za-z0-9]{16}$'  # Exact 16-char with no special chars is likely a false positive
  paths:
    - '**/test/**'
    - '**/tests/**'
    - '**/mock/**'
    - '**/mocks/**'
    - '**/__tests__/**'
    - '**/*.test.*'
    - '**/*.spec.*'
    - '**/fixtures/**'
    - '**/docs/**'
    - '**/examples/**'
