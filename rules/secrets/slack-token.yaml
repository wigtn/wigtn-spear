# rules/secrets/slack-token.yaml
# Detects Slack API tokens (Bot, User, Workspace, Webhook URLs)
#
# Slack token formats:
#   - Bot token:    xoxb-NNNNNNNNN-NNNNNNNNN-xxxxxxxxxxxxxxxxxxxx
#   - User token:   xoxp-NNNNNNNNN-NNNNNNNNN-NNNNNNNNN-xxxxxxxxxxxxxxxx
#   - Workspace:    xoxa-NNNNNNNNN-NNNNNNNNN-xxxxxxxxxxxxxxxxxxxx
#   - Webhook URL:  https://hooks.slack.com/services/<TEAM_ID>/<BOT_ID>/<TOKEN>
#
# References:
#   - https://api.slack.com/authentication/token-types
#   - CWE-798: Use of Hard-coded Credentials

id: SPEAR-S003
name: Slack Token
description: >
  Detects Slack API tokens (bot, user, and workspace tokens) and webhook
  URLs in source code. Compromised Slack tokens can allow an attacker to
  read/send messages in private channels, exfiltrate files, enumerate
  users, and impersonate bots within an organization.
category: secret
severity: high
tags:
  - slack
  - messaging
  - credential
  - token
  - webhook
references:
  - https://cwe.mitre.org/data/definitions/798.html
  - https://api.slack.com/authentication/token-types
  - https://api.slack.com/messaging/webhooks
mitre:
  - T1552.001  # Unsecured Credentials: Credentials In Files
  - T1530      # Data from Cloud Storage Object

detection:
  keywords:
    - xoxb-
    - xoxp-
    - xoxa-
    - xoxo-
    - hooks.slack.com/services

  # Matches Slack bot/user/workspace tokens and webhook URLs
  pattern: '(?:xox[bpao]-[0-9]{8,13}-[0-9]{8,13}(?:-[0-9]{8,13})?-[a-zA-Z0-9]{20,40}|https://hooks\.slack\.com/services/T[A-Z0-9]{8,}/B[A-Z0-9]{8,}/[a-zA-Z0-9]{20,})'

  entropy:
    enabled: false  # Structured format with known prefixes

verification:
  enabled: true
  method: slack-auth-test
  rateLimit:
    rpm: 20
    concurrent: 3

allowlist:
  patterns:
    - '(?i)example|test|dummy|fake|placeholder|sample'
    - 'xoxb-0{10}-0{10}-[x]{24}'
  paths:
    - '**/test/**'
    - '**/tests/**'
    - '**/mock/**'
    - '**/mocks/**'
    - '**/__tests__/**'
    - '**/*.test.*'
    - '**/*.spec.*'
    - '**/fixtures/**'
