# rules/secrets/github-token.yaml
# Detects GitHub Personal Access Tokens (classic and fine-grained)
#
# GitHub token formats:
#   - Classic PAT:        ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx (40 hex after prefix)
#   - Fine-grained PAT:   github_pat_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
#   - OAuth access token:  gho_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
#   - User-to-server:     ghu_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
#   - Server-to-server:   ghs_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
#   - Refresh token:       ghr_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
#
# References:
#   - https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/about-authentication-to-github
#   - CWE-798: Use of Hard-coded Credentials

id: SPEAR-S002
name: GitHub Token
description: >
  Detects GitHub personal access tokens, OAuth tokens, and app tokens in
  source code. GitHub tokens can provide full repository access, ability
  to modify code, create releases, manage organizations, and access
  private data depending on the scopes granted.
category: secret
severity: critical
tags:
  - github
  - vcs
  - credential
  - token
references:
  - https://cwe.mitre.org/data/definitions/798.html
  - https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/about-authentication-to-github
  - https://github.blog/2021-04-05-behind-githubs-new-authentication-token-formats/
mitre:
  - T1552.001  # Unsecured Credentials: Credentials In Files
  - T1078.004  # Valid Accounts: Cloud Accounts

detection:
  keywords:
    - ghp_
    - gho_
    - ghu_
    - ghs_
    - ghr_
    - github_pat_

  # Matches all six GitHub token formats:
  #   ghp_, gho_, ghu_, ghs_, ghr_ : prefix + 36 alphanumeric chars
  #   github_pat_ : prefix + 22_59 alphanumeric chars (82 total)
  pattern: '(?:ghp_[A-Za-z0-9]{36}|gho_[A-Za-z0-9]{36}|ghu_[A-Za-z0-9]{36}|ghs_[A-Za-z0-9]{36}|ghr_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{22,82})'

  entropy:
    enabled: false  # Fixed-format tokens with known prefixes

verification:
  enabled: true
  method: github-api-check
  rateLimit:
    rpm: 30
    concurrent: 5

allowlist:
  patterns:
    - '(?i)example|test|dummy|fake|placeholder|sample|xxxx'
    - 'ghp_0{36}'
  paths:
    - '**/test/**'
    - '**/tests/**'
    - '**/mock/**'
    - '**/mocks/**'
    - '**/__tests__/**'
    - '**/*.test.*'
    - '**/*.spec.*'
    - '**/fixtures/**'
