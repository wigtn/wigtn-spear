# rules/secrets/private-key.yaml
# Detects RSA, EC, DSA, and SSH private keys embedded in source code.
#
# Private keys in PEM format are delimited by well-known headers:
#   -----BEGIN RSA PRIVATE KEY-----
#   -----BEGIN PRIVATE KEY-----
#   -----BEGIN EC PRIVATE KEY-----
#   -----BEGIN DSA PRIVATE KEY-----
#   -----BEGIN OPENSSH PRIVATE KEY-----
#
# Unlike API tokens, private keys span multiple lines. The regex targets
# the header line only; the scanner should flag the entire block.
#
# References:
#   - CWE-321: Use of Hard-coded Cryptographic Key
#   - MITRE T1552.004: Unsecured Credentials: Private Keys

id: SPEAR-S020
name: Private Key
description: >
  Detects PEM-encoded private keys (RSA, EC, DSA, PKCS#8, OpenSSH) in
  source code and configuration files. Exposed private keys enable
  impersonation of servers (TLS), authentication bypass (SSH), code
  signing forgery, and decryption of encrypted communications. This
  is typically a critical finding requiring immediate key rotation.
category: secret
severity: critical
tags:
  - private-key
  - cryptographic
  - ssh
  - tls
  - pem
references:
  - https://cwe.mitre.org/data/definitions/321.html
  - https://www.rfc-editor.org/rfc/rfc7468
  - https://man.openbsd.org/ssh-keygen.1
mitre:
  - T1552.004  # Unsecured Credentials: Private Keys
  - T1588.004  # Obtain Capabilities: Digital Certificates

detection:
  keywords:
    - "BEGIN RSA PRIVATE KEY"
    - "BEGIN PRIVATE KEY"
    - "BEGIN EC PRIVATE KEY"
    - "BEGIN DSA PRIVATE KEY"
    - "BEGIN OPENSSH PRIVATE KEY"
    - "BEGIN PGP PRIVATE KEY BLOCK"

  # Matches PEM header lines for all common private key types
  pattern: '-----BEGIN\s+(?:RSA\s+)?(?:EC\s+)?(?:DSA\s+)?(?:OPENSSH\s+)?(?:PGP\s+)?PRIVATE\s+KEY(?:\s+BLOCK)?-----'

  entropy:
    enabled: false  # PEM headers are fixed format; the base64 body is always high-entropy

verification:
  enabled: false  # Private keys cannot be live-verified without a paired service

allowlist:
  patterns:
    - '(?i)example|test|dummy|fake|placeholder|sample'
    # Common test/example keys from documentation
    - 'MIIEvgIBADANBgkqhkiG9w0BAQEFAASCBKgwggSkAgEAAoIBAQC7'
  paths:
    - '**/test/**'
    - '**/tests/**'
    - '**/mock/**'
    - '**/mocks/**'
    - '**/__tests__/**'
    - '**/*.test.*'
    - '**/*.spec.*'
    - '**/fixtures/**'
    - '**/testdata/**'
    - '**/*.example'
    - '**/*.sample'
