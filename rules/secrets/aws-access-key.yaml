# rules/secrets/aws-access-key.yaml
# Detects AWS Access Key IDs (AKIA* for long-term, ASIA* for STS temporary)
#
# References:
#   - CWE-798: Use of Hard-coded Credentials
#   - AWS IAM documentation on access key format
#   - MITRE T1552.001: Unsecured Credentials in Files

id: SPEAR-S001
name: AWS Access Key
description: >
  Detects AWS access key IDs (AKIA for long-term keys, ASIA for temporary
  STS credentials) embedded in source code, configuration files, or
  documentation. Active keys grant direct API access to AWS services
  and represent a critical risk of cloud infrastructure compromise.
category: secret
severity: critical
tags:
  - aws
  - cloud
  - credential
  - iam
references:
  - https://cwe.mitre.org/data/definitions/798.html
  - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
mitre:
  - T1552.001  # Unsecured Credentials: Credentials In Files

detection:
  # Stage 1: Aho-Corasick keyword pre-filter (fast rejection)
  keywords:
    - AKIA
    - ASIA

  # Stage 2: Regex pattern matching
  # AWS access key IDs are exactly 20 characters: prefix (4) + alphanumeric (16)
  pattern: '(?:AKIA|ASIA)[0-9A-Z]{16}'

  # Stage 3: Entropy analysis
  entropy:
    enabled: false  # AWS keys have fixed format -- entropy adds no signal

verification:
  enabled: true
  method: aws-sts-get-caller-identity
  rateLimit:
    rpm: 10
    concurrent: 2

allowlist:
  patterns:
    - 'AKIAIOSFODNN7EXAMPLE'           # Official AWS documentation example key
    - 'ASIAIOSFODNN7EXAMPLE'           # Official AWS STS documentation example
    - '(?i)example|test|dummy|fake|placeholder|sample|your_?access_?key'
  paths:
    - '**/test/**'
    - '**/tests/**'
    - '**/mock/**'
    - '**/mocks/**'
    - '**/__tests__/**'
    - '**/*.test.*'
    - '**/*.spec.*'
    - '**/fixtures/**'
